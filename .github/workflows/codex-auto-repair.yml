name: Codex Auto Repair

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  repair:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout failing branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests and capture failures
        id: precheck
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee failing-tests.txt
          test_exit=${PIPESTATUS[0]}
          echo "exit_code=$test_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Invoke Codex non-interactively
        if: steps.precheck.outputs.exit_code != '0'
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/codex-repair.prompt.md
          sandbox: workspace-write
          codex-args: '["--full-auto"]'

      - name: Commit and push repair
        if: steps.precheck.outputs.exit_code != '0'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch generated by Codex."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: codex auto-repair failing tests"
          git push origin "HEAD:${{ github.event.workflow_run.head_branch }}"

      - name: Re-run validation
        run: python -m unittest discover -s tests -p "test_*.py"

